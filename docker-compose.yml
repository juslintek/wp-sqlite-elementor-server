services:
  wordpress:
    build:
      context: .
      args:
        # Toggle any of these to build a lean variant (e.g. all false = no Elementor stack)
        WITH_ELEMENTOR: "${WITH_ELEMENTOR:-true}"
        WITH_PRO_ELEMENTS: "${WITH_PRO_ELEMENTS:-true}"
        WITH_HELLO_ELEMENTOR: "${WITH_HELLO_ELEMENTOR:-true}"
        WP_VERSION: "${WP_VERSION:-latest}"
        FRANKENPHP_VERSION: "${FRANKENPHP_VERSION:-latest}"
    ports:
      - "${WP_PORT:-8080}:8080"
    environment:
      WP_ADMIN_USER: "${WP_ADMIN_USER:-}"
      WP_ADMIN_PASS: "${WP_ADMIN_PASS:-admin}"
      WP_ADMIN_EMAIL: "${WP_ADMIN_EMAIL:-admin@test.local}"
      WP_TITLE: "${WP_TITLE:-Elementor MCP}"
      WP_DEBUG: "${WP_DEBUG:-false}"
    volumes:
      - "${WP_DATABASE_DIR:-wp_database}:/wp/wp-content/database"
      - "${WP_UPLOADS_DIR:-wp_uploads}:/wp/wp-content/uploads"

volumes:
  wp_database:
  wp_uploads:
